services:
  iroffer:
    build:
      context: .
      args:
        IROFFER_USER_ID: ${IROFFER_USER_ID:-1000}
        IROFFER_GROUP_ID: ${IROFFER_GROUP_ID:-1000}
    image: ${IMAGE_NAME:-iroffer-dinoex}:${IMAGE_TAG:-local}
    container_name: ${CONTAINER_NAME:-iroffer}
    restart: unless-stopped
    tty: true        # iroffer requires a pseudo-TTY for foreground (-k) mode
    env_file:
      - .env
    volumes:
      - ${HOST_CONFIG_DIR}:/home/iroffer/config
      - ${HOST_DATA_DIR}:/home/iroffer/data
      - ${HOST_LOG_DIR}:/home/iroffer/logs
    ports:
      - ${PORT_RANGE}:${PORT_RANGE}

