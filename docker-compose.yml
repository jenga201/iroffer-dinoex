services:
  iroffer:
    build:
      context: .
      args:
        CONT_IMG_VER: ${CONT_IMG_VER}
        IROFFER_USER_ID: ${IROFFER_USER_ID}
        IROFFER_GROUP_ID: ${IROFFER_GROUP_ID}
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    tty: true        # iroffer requires a pseudo-TTY for foreground (-k) mode
    env_file:
      - .env
    volumes:
      - ${HOST_CONFIG_DIR}:/home/iroffer/config
      - ${HOST_DATA_DIR}:/home/iroffer/data
      - ${HOST_LOG_DIR}:/home/iroffer/logs
    ports:
      - ${PORT_RANGE}:${PORT_RANGE}

